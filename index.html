<!DOCTYPE html>
<html>
<head>
<title>Customer Churn Dashboard</title>
<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="container">

<h1>Bank Customer Churn Dashboard</h1>

<div class="card">
<h2>Select Bank</h2>
<select id="bankSelect"></select>
<button onclick="loadBank()">Load Bank Data</button>
</div>

<div class="card">
<h2>Bank Summary</h2>
<p>Total Customers: <span id="total"></span></p>
<p>At Risk: <span id="risk"></span></p>
<p>Safe: <span id="safe"></span></p>
</div>

<div class="card">
<h2>Top Risk Customers</h2>
<table id="riskTable"></table>
</div>

<div class="card">
<h2>All Customers</h2>
<table id="allTable"></table>
</div>

</div>

<script>

const API = "https://your-render-service-name.onrender.com"

async function loadBanks(){

let res = await fetch(API+"/api/portal")
let data = await res.json()

let select=document.getElementById("bankSelect")
select.innerHTML=""

data.banks.forEach(b=>{
let opt=document.createElement("option")
opt.value=b.bankId
opt.text=b.bankName+" - "+b.managerName
select.appendChild(opt)
})

}

async function loadBank(){

let bankId=document.getElementById("bankSelect").value

let res = await fetch(API+"/api/bank/"+bankId)
let data = await res.json()

document.getElementById("total").innerText=data.total
document.getElementById("risk").innerText=data.at_risk
document.getElementById("safe").innerText=data.safe

let riskTable=document.getElementById("riskTable")
riskTable.innerHTML="<tr><th>ID</th><th>Name</th><th>Risk %</th></tr>"

data.top_risk.forEach(c=>{
riskTable.innerHTML+=`<tr>
<td>${c.customerId}</td>
<td>${c.name}</td>
<td>${c.Churn_Prob.toFixed(2)}</td>
</tr>`
})

let allTable=document.getElementById("allTable")
allTable.innerHTML="<tr><th>ID</th><th>Name</th><th>Tenure</th><th>Charges</th><th>Risk</th></tr>"

data.all_customers.forEach(c=>{
allTable.innerHTML+=`<tr>
<td>${c.customerId}</td>
<td>${c.name}</td>
<td>${c.tenure}</td>
<td>${c.monthlyCharges}</td>
<td>${c.Churn_Prob.toFixed(2)}</td>
</tr>`
})

}

loadBanks()

</script>

</body>
</html>
